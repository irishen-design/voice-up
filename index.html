<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>French Pronunciation Log</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='0.9em' font-size='90'%3E🥐%3C/text%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <header>
        <h1>French Pronunciation Log 🥐</h1>
        <p class="subtitle">
          Type a word or sentence, hear it, and save it for review.
        </p>
      </header>

      <!-- Auth bar -->
      <div class="auth-bar">
        <div id="authUser" class="auth-user">
          <span class="auth-status"
            >Not signed in — history saved locally only</span
          >
        </div>
        <div style="display: flex; align-items: center; gap: 10px">
          <span id="syncBadge" class="sync-badge off">⚡ Local only</span>
          <button class="google" id="signInBtn">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path
                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                fill="#4285F4"
              />
              <path
                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                fill="#34A853"
              />
              <path
                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
                fill="#FBBC05"
              />
              <path
                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                fill="#EA4335"
              />
            </svg>
            Sign in with Google
          </button>
          <button class="signout" id="signOutBtn" style="display: none">
            Sign out
          </button>
        </div>
      </div>

      <section class="panel">
        <label for="textInput">French text</label>
        <textarea
          id="textInput"
          rows="4"
          placeholder="Example: Il bout d'impatience."
        ></textarea>

        <div class="controls">
          <button id="playBtn">▶ Play</button>
          <button id="slowBtn" class="slow">
            <span class="turtle">🐢</span>
          </button>
          <button id="saveBtn">＋ Save to history</button>
          <button id="clearInputBtn" class="secondary">Clear input</button>
        </div>
        <p id="status" class="status">Ready.</p>
      </section>

      <section class="panel">
        <div class="history-header">
          <h2>History</h2>
          <div class="history-actions">
            <input
              id="searchInput"
              type="text"
              placeholder="Search history..."
            />
            <button id="showFavoritesBtn" class="secondary">
              Show favorites only
            </button>
            <button id="showVerbsBtn" class="secondary">Show verbs only</button>
            <button id="clearHistoryBtn" class="danger">
              Clear all history
            </button>
          </div>
        </div>
        <ul id="historyList" class="history-list"></ul>
      </section>
    </div>

    <!-- Firebase SDKs -->
    <script type="module" src="main.js"></script>
  </body>
</html>
